spring:
  application:
    name: notifyflow
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}



management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      channelSender:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      channelSender:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - com.joaogabriel.notifyflow.domain.exception.ChannelDeliveryException
  ratelimiter:
    instances:
      default-tenant:
        limitForPeriod: 100
        limitRefreshPeriod: 1m
        timeoutDuration: 0s

channels:
  email:
    provider: ${EMAIL_PROVIDER}
  from-email: ${FROM_EMAIL}

sendgrid:
  api-key: ${SENDGRID_API_KEY}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}

